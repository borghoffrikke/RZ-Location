<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>定位助手 - 实时监控</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;height:100dvh;overflow:hidden;background:#000}
#header{height:40px;background:#1976D2;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 12px}
#status{font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap}
#status.online{background:#4CAF50}
#status.offline{background:#F44336}
#map{width:100%;height:calc(100dvh - 40px - 140px)}
#log{width:100%;height:60px;background:#111;color:#0f0;font-size:10px;padding:4px 8px;overflow-y:auto;font-family:monospace}
#panel{width:100%;height:80px;background:#fff;overflow-y:auto;border-top:2px solid #1976D2}
.dev{padding:8px 12px;border-bottom:1px solid #eee;cursor:pointer;font-size:13px;display:flex;justify-content:space-between}
.dev:active{background:#e0e0e0}
.name{font-weight:bold}
.time{color:#999;font-size:10px}

#login{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
#login>div{background:#fff;padding:20px;border-radius:8px;width:100%;max-width:320px}
#login h3{font-size:16px;margin-bottom:10px}
#login label{font-size:12px;color:#666;display:block;margin-top:6px}
#login input{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:16px;margin-top:2px}
#login button{width:100%;padding:12px;background:#1976D2;color:#fff;border:none;border-radius:4px;font-size:16px;margin-top:10px;cursor:pointer}
#login .row{display:flex;align-items:center;gap:6px;margin-top:4px}
#login .row span{font-size:11px}
#login .tip{font-size:10px;color:#999;margin-top:6px;text-align:center}
</style>
</head>
<body>

<div id="header">
  <b>📍 设备定位</b>
  <span id="status" class="offline">未连接</span>
</div>
<div id="map"></div>
<div id="log"></div>
<div id="panel"></div>

<div id="login">
  <div>
    <h3>连接 EMQX</h3>
    <label>地址</label>
    <input id="host" value="wss://g16b99c6.ala.cn-hangzhou.emqxsl.cn:8084/mqtt">
    <label>用户名</label>
    <input id="username" autocomplete="off">
    <label>密码</label>
    <input id="password" type="password" autocomplete="off">
    <label>群组</label>
    <input id="groupId" value="1">
    <div class="row">
      <input type="checkbox" id="saveCreds" checked style="width:auto">
      <span>记住登录</span>
    </div>
    <button id="btnConnect" type="button">连 接</button>
    <div class="tip">底部显示日志和设备信息</div>
  </div>
</div>

<script>
const LS='locapp_creds',$=id=>document.getElementById(id);
const map=L.map('map',{zoomControl:true}).setView([35,105],5);
L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18}).addTo(map);
map.invalidateSize();

const markers={},devices={},colors=['#E53935','#43A047','#FB8C00','#8E24AA','#00ACC1'];
let ci=0,cm={};

function log(msg){
  const el=$('log');
  el.innerHTML+='['+new Date().toLocaleTimeString()+'] '+msg+'<br>';
  el.scrollTop=el.scrollHeight;
}

// WGS84 → GCJ02 坐标转换（纠偏 ~300m）
function wgs2gcj(lng,lat){
  if(lng<72.004||lng>137.8347||lat<0.8293||lat>55.8271)return[lng,lat];
  const a=6378245,ee=0.00669342162296594323;
  function tlat(x,y){let r=-100+2*x+3*y+0.2*y*y+0.1*x*y+0.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*Math.PI)+20*Math.sin(2*x*Math.PI))*2/3;r+=(20*Math.sin(y*Math.PI)+40*Math.sin(y/3*Math.PI))*2/3;r+=(160*Math.sin(y/12*Math.PI)+320*Math.sin(y*Math.PI/30))*2/3;return r}
  function tlng(x,y){let r=300+x+2*y+0.1*x*x+0.1*x*y+0.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*Math.PI)+20*Math.sin(2*x*Math.PI))*2/3;r+=(20*Math.sin(x*Math.PI)+40*Math.sin(x/3*Math.PI))*2/3;r+=(150*Math.sin(x/12*Math.PI)+300*Math.sin(x/30*Math.PI))*2/3;return r}
  let dlat=tlat(lng-105,lat-35),dlng=tlng(lng-105,lat-35);
  let rad=lat/180*Math.PI,magic=Math.sin(rad);magic=1-ee*magic*magic;
  let sqrt=Math.sqrt(magic);dlat=dlat*180/((a*(1-ee))/(magic*sqrt)*Math.PI);dlng=dlng*180/(a/sqrt*Math.cos(rad)*Math.PI);
  return[lng+dlng,lat+dlat];
}

function connect(auto){
  const host=$('host').value.trim();
  const user=$('username').value.trim();
  const pass=$('password').value;
  const gid=$('groupId').value.trim()||'1';

  if(!auto && !host.startsWith('wss://') && !host.startsWith('ws://')){alert('地址需以 wss:// 开头');return}

  if($('saveCreds').checked) localStorage.setItem(LS,JSON.stringify({host,user,pass,group:gid}));

  $('status').textContent='连接中...';$('status').className='';
  log('正在连接...');
  $('login').style.display='none';

  const opts={clientId:'w-'+Date.now().toString(36),clean:true,keepalive:60,reconnectPeriod:5000,connectTimeout:10000};
  if(user){opts.username=user;opts.password=pass}

  try{
    const c=mqtt.connect(host,opts);
    c.on('connect',()=>{
      $('status').textContent='已连接';$('status').className='online';
      log('✓ 已连接');
      const lt='location/group/'+gid,st='status/group/'+gid;
      c.subscribe([lt,st],err=>log(err?'✗订阅失败:'+err.message:'✓订阅成功'));
    });
    c.on('message',(topic,raw)=>{
      try{
        const d=JSON.parse(raw.toString());if(!d.deviceId)return;
        const id=d.deviceId;
        if(!devices[id])devices[id]={id,label:id.slice(0,8),lat:0,lng:0,ts:0,online:false};
        if(d.lat!==undefined){
          // WGS84→GCJ02 转换（高德地图需要火星坐标）
          const gcj=wgs2gcj(d.lng,d.lat);
          devices[id].lat=gcj[1];devices[id].lng=gcj[0];devices[id].ts=d.ts||Date.now();devices[id].online=true;
        else{devices[id].online=d.online;if(d.label)devices[id].label=d.label}
        refreshUI();
      }catch(err){}
    });
    c.on('error',e=>{log('✗ '+e.message);$('status').textContent='错误';$('status').className='offline'});
    c.on('close',()=>{log('断开');$('status').textContent='断开';$('status').className='offline'});
  }catch(e){log('异常:'+e.message)}
}

$('btnConnect').addEventListener('click',()=>connect(false));
$('status').addEventListener('click',()=>{$('login').style.display='flex'});

function refreshUI(){
  const list=Object.values(devices).filter(d=>d.online).sort((a,b)=>b.ts-a.ts);
  $('panel').innerHTML=list.length===0
    ?'<div class="dev" style="color:#999">暂无在线设备 — 请打开手机App</div>'
    :list.map(d=>{
      if(!cm[d.id])cm[d.id]=colors[ci++%colors.length];
      const c=cm[d.id],t=d.ts?new Date(d.ts).toLocaleTimeString('zh-CN'):'';
      return '<div class="dev" data-id="'+d.id+'" style="border-left:4px solid '+c+'">'
        +'<span><span style="color:'+c+'">●</span> <span class="name">'+(d.label||d.id.slice(0,8))+'</span>'
        +(d.lat?'<br><small>'+d.lat.toFixed(5)+','+d.lng.toFixed(5)+'</small>':'<br><small>等待GPS</small>')+'</span>'
        +'<span class="time">'+t+'</span></div>';
    }).join('');
  document.querySelectorAll('.dev').forEach(el=>{
    const id=el.dataset.id;
    el.addEventListener('click',()=>flyTo(id));
    el.addEventListener('touchend',e=>{e.preventDefault();flyTo(id)});
  });
  for(const d of Object.values(devices)){
    if(!d.online||!d.lat){if(markers[d.id]){map.removeLayer(markers[d.id]);delete markers[d.id]}continue}
    if(!cm[d.id])cm[d.id]=colors[ci++%colors.length];
    const icon=L.divIcon({html:'<div style="background:'+cm[d.id]+';width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4)"></div>',className:'',iconSize:[14,14],iconAnchor:[7,7]});
    if(markers[d.id])markers[d.id].setLatLng([d.lat,d.lng]);
    else markers[d.id]=L.marker([d.lat,d.lng],{icon}).addTo(map).bindPopup('<b>'+(d.label||d.id.slice(0,8))+'</b><br>'+d.lat.toFixed(5)+','+d.lng.toFixed(5));
  }
}

function flyTo(id){const d=devices[id];if(d&&d.lat){map.flyTo([d.lat,d.lng],16,{duration:1});if(markers[id])markers[id].openPopup()}}

// 自动登录：有凭据直接连
(function(){
  try{
    const s=JSON.parse(localStorage.getItem(LS));
    if(s&&s.host){
      $('host').value=s.host;$('username').value=s.user||'';$('password').value=s.pass||'';$('groupId').value=s.group||'1';
      $('saveCreds').checked=true;
      setTimeout(()=>connect(true),300);
    }
  }catch(_){}
})();
</script>
</body>
</html>
