<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>定位助手 - 实时监控</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#header{background:#1976D2;color:#fff;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#status{font-size:12px;padding:3px 10px;border-radius:10px;white-space:nowrap}
.online{background:#4CAF50}
.offline{background:#F44336}
#map{flex:1;min-height:0}
#log{background:#1a1a2e;color:#0f0;font-size:10px;padding:6px;max-height:100px;overflow-y:auto;flex-shrink:0;font-family:monospace}
#panel{background:#fff;border-top:2px solid #ddd;max-height:140px;overflow-y:auto;flex-shrink:0}
.dev{padding:8px 12px;border-bottom:1px solid #eee;cursor:pointer;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.dev:active{background:#e8e8e8}
.name{font-weight:bold}
.time{color:#999;font-size:10px}
#login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
#login-box{background:#fff;padding:20px;border-radius:8px;width:100%;max-width:320px}
#login-box h3{font-size:16px;margin-bottom:10px}
#login-box label{font-size:12px;color:#666;display:block;margin-top:8px}
#login-box input{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;font-size:16px;margin-top:2px}
#login-box button{width:100%;padding:12px;background:#1976D2;color:#fff;border:none;border-radius:4px;font-size:16px;margin-top:12px;cursor:pointer}
.tip{font-size:11px;color:#999;margin-top:8px;text-align:center}
#loading{display:none;text-align:center;padding:4px;color:#1976D2;font-size:12px}
</style>
</head>
<body>

<div id="header">
  <b>📍 设备定位</b>
  <span id="status" class="offline">未连接</span>
</div>
<div id="loading">⏳ 连接中...</div>
<div id="map"></div>
<div id="log"></div>
<div id="panel"></div>

<div id="login-overlay">
  <div id="login-box">
    <h3>连接 EMQX</h3>
    <label>WebSocket 地址</label>
    <input id="host" value="wss://g16b99c6.ala.cn-hangzhou.emqxsl.cn:8084/mqtt">
    <label>用户名</label>
    <input id="username" autocomplete="off">
    <label>密码</label>
    <input id="password" type="password" autocomplete="off">
    <label>群组 ID</label>
    <input id="groupId" value="1">
    <button id="btnConnect" type="button">连 接</button>
    <div class="tip">确保 EMQX 已开启 WebSocket (端口 8084)</div>
  </div>
</div>

<script>
document.getElementById('btnConnect').addEventListener('click', connect);
document.getElementById('btnConnect').addEventListener('touchend', function(e){ e.preventDefault(); connect(); });

const map = L.map('map').setView([35,105],5);
L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{
  subdomains:'1234', maxZoom:18
}).addTo(map);

const markers={}, devices={};
const colors=['#E53935','#43A047','#FB8C00','#8E24AA','#00ACC1'];
let ci=0, cm={};

function log(msg) {
  const el = document.getElementById('log');
  el.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
  el.scrollTop = el.scrollHeight;
}

function setStatus(txt, cls) {
  const s = document.getElementById('status');
  s.textContent = txt; s.className = cls;
  document.getElementById('loading').style.display = (cls==='')?'block':'none';
}

function connect() {
  const host = document.getElementById('host').value.trim();
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  const gid = document.getElementById('groupId').value.trim()||'1';

  if (!host.startsWith('wss://') && !host.startsWith('ws://')) {
    alert('地址必须以 wss:// 或 ws:// 开头'); return;
  }

  setStatus('连接中...', '');
  log('连接: ' + host);

  const opts = {
    clientId: 'web-' + Date.now().toString(36),
    clean: true,
    keepalive: 60,
    reconnectPeriod: 5000,
    connectTimeout: 10000
  };
  if (user) { opts.username = user; opts.password = pass; }

  try {
    const client = mqtt.connect(host, opts);

    client.on('connect', () => {
      setStatus('已连接', 'online');
      document.getElementById('login-overlay').style.display = 'none';
      log('WebSocket 已连接');
      const lt = 'location/group/' + gid;
      const st = 'status/group/' + gid;
      client.subscribe([lt, st], (err) => {
        if (err) log('订阅失败: ' + err.message);
        else log('已订阅: ' + lt);
      });
    });

    client.on('message', (topic, raw) => {
      try {
        const d = JSON.parse(raw.toString());
        if (!d.deviceId) return;
        const id = d.deviceId;
        if (!devices[id]) devices[id]={id,label:id.slice(0,8),lat:0,lng:0,ts:0,online:false};
        if (d.lat !== undefined) {
          devices[id].lat = d.lat; devices[id].lng = d.lng;
          devices[id].ts = d.ts||Date.now(); devices[id].online = true;
          log('📍 '+devices[id].label+': '+d.lat.toFixed(5)+','+d.lng.toFixed(5));
        } else {
          devices[id].online = d.online;
          if (d.label) devices[id].label = d.label;
          log('📡 '+devices[id].label+': '+(d.online?'在线':'离线'));
        }
        refreshUI();
      } catch(err) { log('解析错误: '+err.message); }
    });

    client.on('error', (err) => {
      log('错误: ' + err.message);
      setStatus('错误', 'offline');
    });

    client.on('close', () => {
      log('连接断开');
      setStatus('断开', 'offline');
    });

    client.on('offline', () => log('离线'));
  } catch(e) {
    log('连接异常: ' + e.message);
    setStatus('失败', 'offline');
  }
}

function refreshUI() {
  const list = Object.values(devices).filter(d=>d.online).sort((a,b)=>b.ts-a.ts);
  document.getElementById('panel').innerHTML = list.length===0
    ? '<div class="dev">暂无在线设备 — 请打开手机 App</div>'
    : list.map(d=>{
        if(!cm[d.id]) cm[d.id]=colors[ci++%colors.length];
        const c=cm[d.id], t=d.ts?new Date(d.ts).toLocaleTimeString('zh-CN'):'';
        return `<div class="dev" data-id="${d.id}" style="border-left:4px solid ${c}">
          <span><span style="color:${c}">●</span> <span class="name">${d.label||d.id.slice(0,8)}</span>
          ${d.lat?`<br><small>${d.lat.toFixed(5)},${d.lng.toFixed(5)}</small>`:'<br><small>等待GPS</small>'}</span>
          <span class="time">${t}</span></div>`;
      }).join('');

  // click handlers
  document.querySelectorAll('.dev').forEach(el => {
    el.addEventListener('click', function(){ flyTo(this.dataset.id); });
    el.addEventListener('touchend', function(e){ e.preventDefault(); flyTo(this.dataset.id); });
  });

  // markers
  for (const d of Object.values(devices)) {
    if (!d.online||!d.lat) { if(markers[d.id]){map.removeLayer(markers[d.id]);delete markers[d.id]} continue }
    if (!cm[d.id]) cm[d.id]=colors[ci++%colors.length];
    const icon = L.divIcon({html:`<div style="background:${cm[d.id]};width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4)"></div>`,className:'',iconSize:[14,14],iconAnchor:[7,7]});
    if (markers[d.id]) markers[d.id].setLatLng([d.lat,d.lng]);
    else markers[d.id]=L.marker([d.lat,d.lng],{icon}).addTo(map).bindPopup(`<b>${d.label||d.id.slice(0,8)}</b><br>${d.lat.toFixed(5)},${d.lng.toFixed(5)}`);
  }
}

function flyTo(id) {
  const d=devices[id];
  if(d&&d.lat){ map.flyTo([d.lat,d.lng],16,{duration:1}); if(markers[id])markers[id].openPopup() }
}
</script>
</body>
</html>
